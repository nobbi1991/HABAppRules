name: Prek auto-update

on:
  # every day at midnight
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
      - uses: browniebroke/prek-autoupdate-action@main
      - uses: peter-evans/create-pull-request@v7
        if: always()
        with:
          branch: update/prek-hooks
          title: Update prek hooks
          labels: 'prek, automated'
          commit-message: "chore: update prek hooks"
          body: Update versions of prek hooks to latest version.
          add-paths: prek.toml
